apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapnscrape-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snapnscrape-redis
  template:
    metadata:
      labels:
        app: snapnscrape-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: {{ .Values.redis.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: snapnscrape-redis
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
